name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6:00 AM UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run scrapers
        run: |
          python3 -m scrapers.farojob
          python3 -m scrapers.keejob
          python3 -m scrapers.offre_emploi_tn

      - name: Clean and export CSV
        run: python3 -m processing.cleaner

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs_cleaned.csv
          git diff --staged --quiet || git commit -m "chore: update jobs data [$(date +'%Y-%m-%d')]"
          git push
